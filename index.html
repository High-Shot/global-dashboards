<style>
:root{
  --bg:#0a0a0a;--bg2:#0a0a0a;--bg3:#141414;--bg4:#1c1c1e;
  --card:#141414;--card-hover:#1c1c1e;
  --border:#262626;--border2:#3a3a3a;
  --text:#fafafa;--text2:#d4d4d4;--muted:#a3a3a3;--dim:#737373;
  --accent:#ff9800;--accent-light:rgba(255,152,0,0.12);--accent-mid:rgba(255,152,0,0.28);--accent-dark:#cc7a00;
  --green:#10b981;--green-bg:rgba(16,185,129,0.12);--green-border:rgba(16,185,129,0.35);
  --amber:#facc15;--amber-bg:rgba(250,204,21,0.12);--amber-border:rgba(250,204,21,0.35);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);--red-border:rgba(239,68,68,0.35);
  --ink:#fafafa;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.4);
  --shadow:0 1px 3px rgba(0,0,0,0.5),0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 6px rgba(0,0,0,0.4),0 2px 4px rgba(0,0,0,0.3);
  --radius:8px;--radius-lg:12px;
  --font-display:'Outfit','Inter',system-ui,sans-serif;
  --font-body:'Inter','Outfit',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:13px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
.mono{font-family:var(--font-mono);font-size:0.92em;font-variant-numeric:tabular-nums;}

/* Header */
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);border-top:3px solid var(--accent);}
.header-left{display:flex;align-items:center;gap:20px;padding:14px 0;}
.brand-logo{display:flex;align-items:center;height:36px;}
.brand-logo svg{height:32px;width:auto;display:block;}
.divider-v{width:1px;height:24px;background:var(--border);}
.header-meta{display:flex;flex-direction:column;gap:1px;}
.header-meta .lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-mono);}
.header-meta .val{font-family:var(--font-mono);font-size:11px;color:var(--text2);font-weight:500;}
.header-right{display:flex;align-items:center;gap:8px;padding:14px 0;}

/* Badges */
.badge{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;font-family:var(--font-mono);}
.badge-info{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid);}

/* Nav bars */
.nav-row{display:flex;background:var(--bg);border-bottom:1px solid var(--border);}
.mkt-bar{padding:0 32px;display:flex;align-items:stretch;gap:0;flex:1;overflow-x:auto;}
.mkt-tab{padding:10px 16px;font-family:var(--font-mono);font-size:11px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;user-select:none;white-space:nowrap;display:flex;align-items:center;gap:6px;font-weight:500;}
.mkt-tab:hover{color:var(--text2);border-bottom-color:var(--border2);}
.mkt-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.mkt-tab .cur{font-size:8px;color:var(--dim);font-weight:400;}
.mkt-tab.active .cur{color:var(--accent);opacity:0.6;}

/* Week selector */
.week-ctrl{display:flex;align-items:center;gap:0;background:var(--bg);border-bottom:1px solid var(--border);padding:6px 32px;}
.week-nav{padding:6px 12px;font-family:var(--font-mono);font-size:11px;color:var(--muted);cursor:pointer;border:none;background:none;transition:color 0.15s;font-weight:500;}
.week-nav:hover{color:var(--text);}
.week-nav:disabled{opacity:0.3;cursor:default;}
.week-select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:var(--font-mono);font-size:11px;cursor:pointer;min-width:140px;}
.week-select:focus{outline:none;border-color:var(--accent);}
.week-range{display:flex;align-items:center;gap:8px;margin-left:20px;padding-left:20px;border-left:1px solid var(--border);}
.week-range-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;font-family:var(--font-mono);}
.week-range-sel{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:var(--font-mono);font-size:10px;cursor:pointer;}
.week-range-sel:focus{outline:none;border-color:var(--accent);}
.compare-badge{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;font-family:var(--font-mono);background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid);margin-left:8px;}

/* Trend bar */
.trend-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 32px;display:flex;align-items:center;gap:24px;overflow-x:auto;}
.trend-item{display:flex;align-items:center;gap:7px;white-space:nowrap;}
.trend-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;font-family:var(--font-mono);}
.trend-v{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text);}
.trend-delta{font-size:9px;font-family:var(--font-mono);padding:1px 5px;border-radius:3px;font-weight:500;}
.up-bad{color:var(--red);background:var(--red-bg);}
.up-good{color:var(--green);background:var(--green-bg);}
.down-bad{color:var(--red);background:var(--red-bg);}
.down-good{color:var(--green);background:var(--green-bg);}
.neutral{color:var(--dim);background:var(--bg3);}
.trend-div{width:1px;height:18px;background:var(--border);}

/* Layout */
.page{padding:24px 32px;max-width:1600px;margin:0 auto;}
.sec{font-family:var(--font-display);font-size:11px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text2);margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:10px;}
.sec::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:1px;}

/* Division ribbon (footer) */
.brand-ribbon{background:var(--bg);border-top:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap;}
.brand-ribbon .rib-lbl{font-family:var(--font-mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.4px;font-weight:500;}
.brand-ribbon a{display:inline-flex;align-items:center;opacity:0.55;transition:opacity 0.2s ease;filter:grayscale(0.15);}
.brand-ribbon a:hover{opacity:1;filter:grayscale(0);}
.brand-ribbon img{height:22px;width:auto;display:block;}
.brand-ribbon .rib-div{width:1px;height:18px;background:var(--border);}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;margin-bottom:24px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);}
.kpi{background:var(--card);padding:14px 16px;position:relative;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.ok::before{background:var(--green);}.kpi.warn::before{background:var(--amber);}.kpi.crit::before{background:var(--red);}.kpi.neutral::before{background:var(--accent);}
.kpi-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:var(--font-mono);font-weight:600;}
.kpi-val{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:3px;letter-spacing:-0.3px;font-variant-numeric:tabular-nums;}
.kpi-val.crit{color:var(--red);}.kpi-val.warn{color:var(--amber);}.kpi-val.ok{color:var(--green);}
.kpi-sub{font-size:9px;color:var(--dim);font-family:var(--font-mono);}

/* Panels & Charts */
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
.panel-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-family:var(--font-mono);font-weight:600;}
.panel-body{padding:16px;}
.chart-wrap canvas{max-height:200px;}
.chart-wrap.tall canvas{max-height:230px;}

/* Marketplace cards */
.mkt-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow);}
.mc{background:var(--card);padding:14px 16px;cursor:pointer;transition:background 0.15s;position:relative;}
.mc:hover{background:var(--card-hover);}
.mc-name{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:8px;letter-spacing:-0.1px;}
.mc-name .mc-cur{font-size:9px;color:var(--dim);font-family:var(--font-mono);font-weight:400;}
.mc-rev{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ink);margin-bottom:8px;letter-spacing:-0.4px;font-variant-numeric:tabular-nums;}
.mc-row{display:flex;justify-content:space-between;margin-bottom:2px;}
.mc-l{font-size:9px;color:var(--muted);font-family:var(--font-mono);font-weight:500;}
.mc-v{font-family:var(--font-mono);font-size:11px;color:var(--text);font-weight:500;}
.mc-v.crit{color:var(--red);}.mc-v.warn{color:var(--amber);}.mc-v.ok{color:var(--green);}
.mc-pct{position:absolute;top:14px;right:16px;font-family:var(--font-mono);font-size:9px;color:var(--dim);font-weight:500;}

/* Product grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow);}
.pc{background:var(--card);padding:12px 14px;position:relative;transition:background 0.15s;}
.pc:hover{background:var(--card-hover);}
.pc.flagged{background:var(--red-bg);}.pc.warned{background:var(--amber-bg);}
.pc-bar{position:absolute;top:0;left:0;right:0;height:2px;}
.pc-bar.crit{background:var(--red);}.pc-bar.warn{background:var(--amber);}.pc-bar.ok{background:var(--green);}
.pc-name{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--ink);margin-bottom:8px;margin-top:4px;letter-spacing:-0.1px;}
.pc-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.pcl{font-size:9px;color:var(--muted);font-family:var(--font-mono);font-weight:500;}
.pcv{font-family:var(--font-mono);font-size:11px;color:var(--text);font-weight:600;}
.pcv.crit{color:var(--red);}.pcv.warn{color:var(--amber);}.pcv.ok{color:var(--green);}
.eff-wrap{margin-top:8px;}
.eff-lbl{display:flex;justify-content:space-between;margin-bottom:3px;}
.eff-track{height:3px;background:var(--bg3);border-radius:2px;position:relative;overflow:hidden;}
.eff-fill{height:100%;border-radius:2px;width:0%;transition:width 0.7s ease;}
.eff-thresh{position:absolute;top:-3px;width:1px;height:9px;background:var(--border2);}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:20px;background:var(--bg);border-bottom:1px solid var(--border);padding:7px 32px;}
.filter-group{display:flex;align-items:center;gap:4px;}
.filter-label{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-mono);margin-right:6px;font-weight:600;}
.filter-btn{padding:4px 12px;border-radius:5px;font-size:10px;font-weight:600;font-family:var(--font-mono);letter-spacing:0.5px;color:var(--muted);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{color:var(--text2);border-color:var(--border2);}
.filter-btn.active{color:var(--accent);background:var(--accent-light);border-color:var(--accent-mid);}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.ani{animation:fadeIn 0.25s ease both;}

footer{border-top:1px solid var(--border);padding:12px 32px;display:flex;justify-content:space-between;align-items:center;color:var(--dim);font-size:9px;font-family:var(--font-mono);background:var(--bg);}

@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(4,1fr);}}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr);}.three-col{grid-template-columns:1fr;}}
</style>
</head>

const MKT_COLORS_LIGHT = {CC_US:'#ff9800',CC_CA:'#10b981',CC_UK:'#a78bfa',CC_FR:'#60a5fa',CC_DE:'#22d3ee',CC_IT:'#fb923c',CC_ES:'#f472b6',CC_NL:'#a3a3a3',CC_MX:'#c084fc',CL_US:'#d97706',PP_US:'#2dd4bf'};
let wIdx=0, mktKey='GLOBAL', CH={};
let brandFilter='ALL';
let viewMode='WEEKLY';

// v3.3: Filter WEEKS to only those with data
var DATA_WEEKS = WEEKS.filter(function(w){
  var keys=Object.keys(w.markets);
  for(var i=0;i<keys.length;i++){
    var a=w.markets[keys[i]].acct;
    if(a&&(a.revenue>0||a.adSpend>0||a.units>0))return true;
  }
  return false;
});
// Replace WEEKS reference for all rendering
WEEKS=DATA_WEEKS;

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const fC = (n,cur) => {const s=cur||'$'; return n>=1e6?s+(n/1e6).toFixed(2)+'M':n>=1000?s+(n/1000).toFixed(1)+'K':s+n.toFixed(0);};
const fCF = (n,cur) => (cur||'$')+n.toLocaleString(undefined,{maximumFractionDigits:0});
const fP = n => n.toFixed(1)+'%';
const fX = n => n.toFixed(1)+'x';
const fN = n => n>=1000?(n/1000).toFixed(1)+'K':String(n);

function getCur(mk){return MKT_META[mk]?.currency||'$';}

function filterMkts(ks){
  if(brandFilter==='CC') return ks.filter(k=>k.startsWith('CC_'));
  return ks;
}

function getGlobalAcct(w){
  const ms=w.markets, ks=filterMkts(Object.keys(ms));
  const t={revenue:0,units:0,sessions:0,pageviews:0,adSpend:0,adSales:0,organicSales:0,ntbOrders:0,ntbSales:0};
  ks.forEach(k=>{const a=ms[k].acct;for(let p in t)t[p]+=(a[p]||0);});
  t.cvr=t.sessions?((t.units/t.sessions)*100):0;
  t.acos=t.adSales?(t.adSpend/t.adSales*100):0;
  t.tacos=t.revenue?(t.adSpend/t.revenue*100):0;
  t.roas=t.adSpend?(t.adSales/t.adSpend):0;
  t.ntbPct=t.units>0?((t.ntbOrders/t.units)*100):0;
  return t;
}

function getMTDWeek(){
  if(WEEKS.length===0) return WEEKS[0];
  const selWeek=WEEKS[wIdx];
  const monthMatch=selWeek.label.match(/WE (\d+)\//);
  const targetMonth=monthMatch?parseInt(monthMatch[1]):null;
  if(!targetMonth) return selWeek;
  const monthWeeks=WEEKS.filter(w=>{const m=w.label.match(/WE (\d+)\//);return m&&parseInt(m[1])===targetMonth;});
  if(monthWeeks.length<=1) return monthWeeks[0]||selWeek;
  const allMktKeys=new Set();
  monthWeeks.forEach(w=>Object.keys(w.markets).forEach(k=>allMktKeys.add(k)));
  const mtdMarkets={};
  allMktKeys.forEach(k=>{
    const sumAcct={revenue:0,units:0,sessions:0,pageviews:0,adSpend:0,adSales:0,organicSales:0,ntbOrders:0,ntbSales:0};
    monthWeeks.forEach(w=>{const a=w.markets[k]?.acct;if(a)for(let p in sumAcct)sumAcct[p]+=(a[p]||0);});
    sumAcct.cvr=sumAcct.sessions?((sumAcct.units/sumAcct.sessions)*100):0;
    sumAcct.acos=sumAcct.adSales?(sumAcct.adSpend/sumAcct.adSales*100):0;
    sumAcct.tacos=sumAcct.revenue?(sumAcct.adSpend/sumAcct.revenue*100):0;
    sumAcct.roas=sumAcct.adSpend?(sumAcct.adSales/sumAcct.adSpend):0;
    sumAcct.ntbPct=sumAcct.units>0?((sumAcct.ntbOrders/sumAcct.units)*100):0;
    const prodMap={};
    monthWeeks.forEach(w=>{(w.markets[k]?.products||[]).forEach(p=>{
      if(!prodMap[p.name])prodMap[p.name]={name:p.name,revenue:0,units:0,sessions:0,adSpend:0,adSales:0,organicSales:0,ntbOrders:0,bsr:p.bsr,subcategory:p.subcategory,subcategoryBSR:p.subcategoryBSR,categoryBSR:p.categoryBSR};
      const t=prodMap[p.name];t.revenue+=(p.revenue||0);t.units+=(p.units||0);t.sessions+=(p.sessions||0);t.adSpend+=(p.adSpend||0);t.adSales+=(p.adSales||0);t.organicSales+=(p.organicSales||0);t.ntbOrders+=(p.ntbOrders||0);
    });});
    const prods=Object.values(prodMap).map(p=>{p.cvr=p.sessions?((p.units/p.sessions)*100):0;p.acos=p.adSales?(p.adSpend/p.adSales*100):0;p.tacos=p.revenue?(p.adSpend/p.revenue*100):0;p.roas=p.adSpend?(p.adSales/p.adSpend):0;p.organic=p.revenue-p.adSales;p.status=p.acos>35?'crit':p.acos>28?'warn':'ok';return p;});
    prods.sort((a,b)=>b.revenue-a.revenue);
    mtdMarkets[k]={acct:sumAcct,products:prods,flags:[]};
  });
  const monthNames=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {label:'MTD '+monthNames[targetMonth],fullLabel:'Month-to-Date: '+monthNames[targetMonth]+' 2026 ('+monthWeeks.length+' weeks)',range:monthWeeks[monthWeeks.length-1].label+' \u2192 '+monthWeeks[0].label,markets:mtdMarkets};
}

function getActiveWeek(){return viewMode==='MTD'?getMTDWeek():WEEKS[wIdx];}

function getMktData(w,mk){
  if(mk==='GLOBAL') return {acct:getGlobalAcct(w),products:[],flags:[]};
  return w.markets[mk]||{acct:{revenue:0,units:0,sessions:0,pageviews:0,adSpend:0,adSales:0,organicSales:0,acos:0,tacos:0,roas:0,ntbOrders:0,ntbSales:0,ntbPct:0,cvr:0},products:[],flags:[]};
}

function delta(val,prev,higherIsBad){
  if(prev===undefined||prev===null||prev===0)return '<span class="trend-delta neutral">\u2014</span>';
  const d=val-prev,p=prev?((d/prev)*100).toFixed(1):'0',a=Math.abs(p);
  if(Math.abs(d)<0.01)return '<span class="trend-delta neutral">0%</span>';
  const cls=higherIsBad?(d>0?'up-bad':'down-good'):(d>0?'up-good':'down-bad');
  return `<span class="trend-delta ${cls}">${d>0?'\u25b2':'\u25bc'} ${a}%</span>`;
}

function renderHeader(){
  const el=document.getElementById('hMkt');
  if(!el) return;
  const raw=MKT_META[mktKey]?.name||mktKey;
  el.textContent=raw.replace(/\s*\(All Markets\)/i,'');
}

function renderMktTabs(){
  const bar=document.getElementById('mktTabBar');
  bar.innerHTML=MKT_KEYS.map(k=>{
    if(k==='GLOBAL') return `<div class="mkt-tab${mktKey==='GLOBAL'?' active':''}" onclick="switchMkt('GLOBAL')">GLOBAL</div>`;
    const m=MKT_META[k]||{};
    return `<div class="mkt-tab${mktKey===k?' active':''}" onclick="switchMkt('${k}')">${m.label||m.flag||k} <span class="cur">${m.currency||''}</span></div>`;
  }).join('');
}

function usWeekNum(d){
  // US Sunday-start: week 1 is the Sun-Sat week containing Jan 1 (Excel WEEKNUM mode 1)
  const y=d.getUTCFullYear();
  const jan1=new Date(Date.UTC(y,0,1));
  const week1Start=new Date(jan1);
  week1Start.setUTCDate(jan1.getUTCDate()-jan1.getUTCDay());
  return Math.floor((d-week1Start)/86400000/7)+1;
}
function weekLabelFor(w){
  const m=(w.fullLabel||'').match(/([A-Za-z]+)\s+(\d+),\s+(\d{4})/);
  if(!m) return w.label+' ('+w.range+')';
  const months={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  const weSun=new Date(Date.UTC(+m[3],months[m[1]],+m[2]));
  return 'WEEK '+usWeekNum(weSun)+' ('+w.range+')';
}
function renderWeekSelector(){
  const sel=document.getElementById('weekSelect');
  sel.innerHTML=WEEKS.map((w,i)=>`<option value="${i}"${i===wIdx?' selected':''}>${weekLabelFor(w)}</option>`).join('');
  const cmpSel=document.getElementById('weekCompare');
  if(wIdx<WEEKS.length-1){
    cmpSel.innerHTML='<option value="prev">vs Prior Week</option>'+WEEKS.map((w,i)=>i!==wIdx?`<option value="${i}">${weekLabelFor(w)}</option>`:'').join('');
    cmpSel.style.display='';
  } else { cmpSel.style.display='none'; }
  document.getElementById('weekPrev').disabled=(wIdx>=WEEKS.length-1);
  document.getElementById('weekNext').disabled=(wIdx<=0);
}

function renderTrendBar(){
  const w=getActiveWeek(),a=getMktData(w,mktKey).acct;
  const cmpSel=document.getElementById('weekCompare');
  let pw=null;
  if(cmpSel&&cmpSel.value==='prev'&&wIdx<WEEKS.length-1) pw=getMktData(WEEKS[wIdx+1],mktKey).acct;
  else if(cmpSel&&cmpSel.value!=='prev') pw=getMktData(WEEKS[parseInt(cmpSel.value)],mktKey).acct;
  const cur=mktKey==='GLOBAL'?'$':getCur(mktKey);
  document.getElementById('trendBar').innerHTML=[
    ['Revenue',fC(a.revenue,cur),delta(a.revenue,pw?.revenue,false)],
    ['Units',fN(a.units),delta(a.units,pw?.units,false)],
    ['Sessions',fN(a.sessions),delta(a.sessions,pw?.sessions,false)],
    ['CVR',fP(a.cvr||0),delta(a.cvr,pw?.cvr,false)],
    ['Ad Spend',fC(a.adSpend,cur),delta(a.adSpend,pw?.adSpend,true)],
    ['TACoS',fP(a.tacos||0),delta(a.tacos,pw?.tacos,true)],
    ['ACoS',fP(a.acos||0),delta(a.acos,pw?.acos,true)],
    ['ROAS',fX(a.roas||0),delta(a.roas,pw?.roas,false)],
  ].map((r,i)=>(i>0?'<div class="trend-div"></div>':'')+`<div class="trend-item"><span class="trend-lbl">${r[0]}</span><span class="trend-v">${r[1]}</span>${r[2]}</div>`).join('');
}

function renderKPIs(){
  const a=getMktData(getActiveWeek(),mktKey).acct;
  const cur=mktKey==='GLOBAL'?'$':getCur(mktKey);
  const ts=a.tacos>15?'crit':a.tacos>10?'warn':'ok';
  const as=a.acos>30?'crit':'ok';
  document.getElementById('kpiRow').innerHTML=[
    ['neutral','Total Revenue',fC(a.revenue,cur),'all products'],
    ['neutral','Units Sold',fN(a.units),'all SKUs'],
    ['neutral','Sessions',fN(a.sessions),'total traffic'],
    ['neutral','Blended CVR',fP(a.cvr||0),'units/sessions'],
    [ts,'TACoS',fP(a.tacos||0),'target <10%'],
    [as,'ACoS',fP(a.acos||0),'limit 30%'],
    ['neutral','ROAS',fX(a.roas||0),'ad return'],
    ['neutral','Ad Spend',fC(a.adSpend,cur),'this week'],
    ['neutral','NTB Orders',fN(a.ntbOrders||0),'new to brand'],
    ['neutral','NTB %',fP(a.ntbPct||0),'of total orders'],
  ].map(([s,l,v,sub])=>`<div class="kpi ${s}"><div class="kpi-lbl">${l}</div><div class="kpi-val ${s==='crit'?'crit':s==='warn'?'warn':''}">${v}</div><div class="kpi-sub">${sub}</div></div>`).join('');
}

  const w=getActiveWeek();
  const mks=filterMkts(Object.keys(w.markets));

    const a=w.markets[k]?.acct||{};const cur=getCur(k);const pct=totalRev?((a.revenue/totalRev)*100).toFixed(1):0;
    const ts=a.tacos>15?'crit':a.tacos>10?'warn':'ok';
    html+=`<div class="mc" onclick="switchMkt('${k}')">
      <div class="mc-pct">${pct}% of rev</div>
      <div class="mc-name">${MKT_META[k]?.label||k}<span class="mc-cur">${cur}</span></div>
      <div class="mc-rev">${fCF(a.revenue||0,cur)}</div>
      <div class="mc-row"><span class="mc-l">Units</span><span class="mc-v">${fN(a.units||0)}</span></div>
      <div class="mc-row"><span class="mc-l">Sessions</span><span class="mc-v">${fN(a.sessions||0)}</span></div>
      <div class="mc-row"><span class="mc-l">CVR</span><span class="mc-v">${fP(a.cvr||0)}</span></div>
      <div class="mc-row"><span class="mc-l">Ad Spend</span><span class="mc-v">${fC(a.adSpend||0,cur)}</span></div>
      <div class="mc-row"><span class="mc-l">TACoS</span><span class="mc-v ${ts}">${fP(a.tacos||0)}</span></div>
      <div class="mc-row"><span class="mc-l">ACoS</span><span class="mc-v ${a.acos>30?'crit':''}">${fP(a.acos||0)}</span></div>
      <div class="mc-row"><span class="mc-l">ROAS</span><span class="mc-v">${fX(a.roas||0)}</span></div>
    </div>`;
  });
  html+='</div>';

  const ccMks=mks.filter(k=>k.startsWith('CC_'));
  if(ccMks.length>1){
    html+=`<div class="three-col">
      <div class="panel"><div class="panel-header"><span class="panel-title">Revenue by Market</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="gRevMkt"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">TACoS by Market</span><span class="badge badge-info" style="font-size:8px">10% target</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="gTacosMkt"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">Organic vs Ad-Driven</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="gOrgMkt"></canvas></div></div></div>

    <div class="two-col">
      <div class="panel"><div class="panel-header"><span class="panel-title">Weekly Revenue Trend</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="gRevTrend"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">Weekly TACoS Trend</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="gTacosTrend"></canvas></div></div></div>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML=html;

function renderMktView(){
  const w=getActiveWeek(), d=getMktData(w,mktKey);
  const cur=getCur(mktKey);
  const prods=d.products||[];
  let html='';

  if(prods.length){
    html+=`<div class="sec">Revenue & Advertising Mix</div><div class="three-col">
      <div class="panel"><div class="panel-header"><span class="panel-title">Revenue by Product</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="cRevenue"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">Organic vs Ad-Driven</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="cOrganic"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">TACoS by Product</span><span class="badge badge-info" style="font-size:8px">10% target</span></div><div class="panel-body"><div class="chart-wrap tall"><canvas id="cTacos"></canvas></div></div></div>
    </div>`;

    html+=`<div class="sec">Product Performance</div><div class="product-grid">`;
    prods.forEach((p,i)=>{
      const vs=p.status||'ok';

      const ec=vs==='crit'?'var(--red)':vs==='warn'?'var(--amber)':'var(--green)';
      const tp=(effTarget/effMax)*100;
      html+=`<div class="pc ${vs==='crit'?'flagged':vs==='warn'?'warned':''}">
        <div class="pc-bar ${vs}"></div>

        <div class="pc-row"><span class="pcl">Units</span><span class="pcv">${fN(p.units)}</span></div>
        <div class="pc-row"><span class="pcl">Sessions</span><span class="pcv">${fN(p.sessions)}</span></div>
        <div class="pc-row"><span class="pcl">CVR</span><span class="pcv">${fP(p.cvr)}</span></div>
        <div class="pc-row"><span class="pcl">Ad Spend</span><span class="pcv">${fCF(p.adSpend,cur)}</span></div>
        <div class="pc-row"><span class="pcl">Organic</span><span class="pcv ${p.organic<0?'crit':''}">${fCF(Math.round(p.organic||0),cur)}</span></div>
        <div class="pc-row"><span class="pcl">NTB Orders</span><span class="pcv">${fN(p.ntbOrders||0)}</span></div>
        <div class="pc-row"><span class="pcl">NTB %</span><span class="pcv">${p.units?fP((p.ntbOrders||0)/p.units*100):'0.0%'}</span></div>

        <div class="pc-row"><span class="pcl">Category BSR</span><span class="pcv">${p.categoryBSR||p.bsr||'\u2014'}</span></div>
        <div class="eff-wrap">
          <div class="eff-lbl"><span class="pcl">TACoS</span><span class="pcv ${vs}">${fP(effVal)} <span style="color:var(--dim);font-size:8px">/ ${effTarget}%</span></span></div>
          <div class="eff-track"><div class="eff-fill" data-w="${ep}" style="background:${ec}"></div><div class="eff-thresh" style="left:${tp}%"></div></div>

    });
    html+='</div>';
  } else {
    html+='<div class="sec" style="color:var(--muted);margin:40px 0">Account-level data only. No product breakdown available for this marketplace.</div>';
  }

  document.getElementById('mainContent').innerHTML=html;
}

function destroyAll(){Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});CH={};}
function mkChart(id,cfg){const el=document.getElementById(id);if(el)CH[id]=new Chart(el,cfg);}

const chartDefaults={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#262626'},ticks:{color:'#a3a3a3',font:{size:10}}},y:{grid:{color:'#262626'},ticks:{color:'#a3a3a3'}}}};

function buildGlobalCharts(){
  const w=getActiveWeek();
  const mks=filterMkts(Object.keys(w.markets));
  const labels=mks.map(k=>MKT_META[k]?.label||k);
  const revs=mks.map(k=>w.markets[k]?.acct.revenue||0);
  const orgs=mks.map(k=>w.markets[k]?.acct.organicSales||0);
  const adsales=mks.map(k=>w.markets[k]?.acct.adSales||0);
  const tacs=mks.map(k=>w.markets[k]?.acct.tacos||0);
  const cols=mks.map(k=>(MKT_COLORS_LIGHT[k]||'#a3a3a3'));

  mkChart('gRevMkt',{type:'bar',data:{labels,datasets:[{data:revs,backgroundColor:cols.map(c=>c+'25'),borderColor:cols,borderWidth:1.5,borderRadius:4}]},options:{...chartDefaults,scales:{x:chartDefaults.scales.x,y:{...chartDefaults.scales.y,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',color:'#a3a3a3',font:{size:9}}}}}});

  mkChart('gTacosMkt',{type:'bar',data:{labels,datasets:[{label:'TACoS',data:tacs,backgroundColor:tacs.map(v=>v>15?'#dc262620':v>10?'#ff980020':'#10b98125'),borderColor:tacs.map(v=>v>15?'#ef4444':v>10?'#ff9800':'#10b981'),borderWidth:1.5,borderRadius:4},{label:'10% Target',data:new Array(mks.length).fill(10),type:'line',borderColor:'#3a3a3a',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false}]},options:{...chartDefaults,plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:10,font:{size:9},color:'#a3a3a3'}}},scales:{x:chartDefaults.scales.x,y:{...chartDefaults.scales.y,ticks:{callback:v=>v+'%',color:'#a3a3a3',font:{size:9}}}}}});

  mkChart('gOrgMkt',{type:'bar',data:{labels,datasets:[{label:'Organic',data:orgs,backgroundColor:'#10b98125',borderColor:'#10b981',borderWidth:1},{label:'Ad Sales',data:adsales,backgroundColor:'#ff980018',borderColor:'#ff9800',borderWidth:1}]},options:{...chartDefaults,plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:10,font:{size:9},color:'#a3a3a3'}}},scales:{x:{stacked:true,grid:{color:'#262626'},ticks:{color:'#a3a3a3',font:{size:10}}},y:{stacked:true,grid:{color:'#262626'},ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',color:'#a3a3a3',font:{size:9}}}}}});

  if(WEEKS.length>1&&document.getElementById('gRevTrend')){
    const wLabels=WEEKS.map(w=>w.label).reverse();
    const trendRevs=WEEKS.map(w=>getGlobalAcct(w).revenue).reverse();
    const trendTacos=WEEKS.map(w=>getGlobalAcct(w).tacos).reverse();

    mkChart('gRevTrend',{type:'line',data:{labels:wLabels,datasets:[{data:trendRevs,borderColor:'#ff9800',backgroundColor:'#ff980010',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#ff9800',borderWidth:2}]},options:{...chartDefaults,scales:{x:{grid:{color:'#262626'},ticks:{color:'#a3a3a3',font:{size:9},maxRotation:45}},y:{...chartDefaults.scales.y,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',color:'#a3a3a3',font:{size:9}}}}}});

    mkChart('gTacosTrend',{type:'line',data:{labels:wLabels,datasets:[{data:trendTacos,borderColor:'#ff9800',segment:{borderColor:ctx=>{const v=ctx.p1.parsed.y;return v>15?'#ef4444':v>10?'#ff9800':'#10b981';}},backgroundColor:'#ff980008',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:trendTacos.map(v=>v>15?'#ef4444':v>10?'#ff9800':'#10b981'),borderWidth:2},{label:'10% Target',data:new Array(wLabels.length).fill(10),borderColor:'#3a3a3a',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false}]},options:{...chartDefaults,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#262626'},ticks:{color:'#a3a3a3',font:{size:9},maxRotation:45}},y:{...chartDefaults.scales.y,ticks:{callback:v=>v+'%',color:'#a3a3a3',font:{size:9}}}}}});
  }
}

function buildMktCharts(){
  const d=getMktData(getActiveWeek(),mktKey);
  const prods=d.products||[];
  if(!prods.length)return;
  const pn=prods.map(p=>p.name.length>14?p.name.substring(0,12)+'..':p.name);
  const cur=getCur(mktKey);
  const revs=prods.map(p=>p.revenue);
  const ads=prods.map(p=>p.adSales);
  const org=prods.map(p=>Math.max(0,(p.organic||0)));
  const tacs=prods.map(p=>p.tacos);
  const cols=prods.map((_,i)=>PC_COLORS[i%PC_COLORS.length]);

  mkChart('cRevenue',{type:'bar',data:{labels:pn,datasets:[{data:revs,backgroundColor:cols.map(c=>c+'20'),borderColor:cols,borderWidth:1.5,borderRadius:3}]},options:{...chartDefaults,scales:{x:chartDefaults.scales.x,y:{...chartDefaults.scales.y,ticks:{callback:v=>cur+(v/1000).toFixed(0)+'k',color:'#a3a3a3',font:{size:9}}}}}});

  mkChart('cOrganic',{type:'bar',data:{labels:pn,datasets:[{label:'Organic',data:org,backgroundColor:'#10b98122',borderColor:'#10b981',borderWidth:1},{label:'Ad Sales',data:ads,backgroundColor:'#ff980015',borderColor:'#ff9800',borderWidth:1}]},options:{...chartDefaults,plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:10,font:{size:9},color:'#a3a3a3'}}},scales:{x:{stacked:true,grid:{color:'#262626'},ticks:{color:'#a3a3a3',font:{size:9}}},y:{stacked:true,grid:{color:'#262626'},ticks:{callback:v=>cur+(v/1000).toFixed(0)+'k',color:'#a3a3a3',font:{size:9}}}}}});

  mkChart('cTacos',{type:'bar',data:{labels:pn,datasets:[{label:'TACoS',data:tacs,backgroundColor:tacs.map(v=>v>15?'#dc262620':v>10?'#ff980020':'#10b98125'),borderColor:tacs.map(v=>v>15?'#ef4444':v>10?'#ff9800':'#10b981'),borderWidth:1.5,borderRadius:3},{label:'10% Target',data:new Array(prods.length).fill(10),type:'line',borderColor:'#3a3a3a',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false}]},options:{...chartDefaults,plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:10,font:{size:9},color:'#a3a3a3'}}},scales:{x:chartDefaults.scales.x,y:{...chartDefaults.scales.y,ticks:{callback:v=>v+'%',color:'#a3a3a3',font:{size:9}}}}}});
}

// ═══════════════════════════════════════════════════════════════
// RENDER ORCHESTRATOR
// ═══════════════════════════════════════════════════════════════
function render(){
  if(WEEKS.length===0){document.getElementById('mainContent').innerHTML='<div class="sec" style="margin:60px 0;text-align:center">No data loaded yet.</div>';return;}
  renderHeader();renderMktTabs();renderWeekSelector();renderTrendBar();renderFilterBar();renderKPIs();
  destroyAll();
  if(mktKey==='GLOBAL'){renderGlobalView();requestAnimationFrame(()=>buildGlobalCharts());}
  else{renderMktView();requestAnimationFrame(()=>{buildMktCharts();setTimeout(()=>{document.querySelectorAll('.eff-fill').forEach((b,i)=>{setTimeout(()=>{b.style.width=b.getAttribute('data-w')+'%';},i*35);});},60);});}
  const aw=getActiveWeek();
  document.getElementById('footWeek').textContent=aw.fullLabel;
  document.getElementById('footMkt').textContent=(MKT_META[mktKey]?.name||mktKey).replace(/\s*\(All Markets\)/i,'');
}

function switchMkt(mk){mktKey=mk;render();}
function switchWeek(i){wIdx=parseInt(i);render();}
function weekPrev(){if(wIdx<WEEKS.length-1){wIdx++;render();}}
function weekNext(){if(wIdx>0){wIdx--;render();}}
function toggleBrand(){brandFilter=brandFilter==='ALL'?'CC':'ALL';render();}
function toggleView(){viewMode=viewMode==='WEEKLY'?'MTD':'WEEKLY';render();}

function renderFilterBar(){
  const fb=document.getElementById('filterBar');
  if(!fb)return;
  fb.innerHTML=`
    <div class="filter-group"><span class="filter-label">View</span>
      <button class="filter-btn ${viewMode==='WEEKLY'?'active':''}" onclick="toggleView()">WEEKLY</button>
      <button class="filter-btn ${viewMode==='MTD'?'active':''}" onclick="toggleView()">MTD</button>
    </div>
    <div class="filter-group"><span class="filter-label">Brands</span>
      <button class="filter-btn ${brandFilter==='ALL'?'active':''}" onclick="toggleBrand()">ALL BRANDS</button>
      <button class="filter-btn ${brandFilter==='CC'?'active':''}" onclick="toggleBrand()">CERAMICS ONLY</button>
    </div>`;
}

window.addEventListener('load',()=>render());
</script>
