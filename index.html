<style>
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--bg4:#222736;--border:#2a2f3d;--border2:#363d52;--white:#f0f2f7;--muted:#8891a8;--dim:#4a5268;--electric:#4fc3f7;--green:#4ade80;--amber:#fbbf24;--red:#f87171;--orange:#fb923c;--purple:#a78bfa;--teal:#2dd4bf;--pink:#f472b6;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.4;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}
.mono{font-family:'DM Mono',monospace;}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:20px;padding:14px 0;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white);}
.brand span{color:var(--electric);}
.divider-v{width:1px;height:28px;background:var(--border);}
.header-meta{display:flex;flex-direction:column;gap:1px;}
.header-meta .lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-family:'DM Mono',monospace;}
.header-meta .val{font-family:'DM Mono',monospace;font-size:12px;color:var(--white);}
.header-right{display:flex;align-items:center;gap:6px;padding:14px 0;}

/* Badges */
.badge{padding:3px 8px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;font-family:'DM Mono',monospace;}
.badge-crit{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3);}
.badge-warn{background:rgba(251,191,36,0.12);color:var(--amber);border:1px solid rgba(251,191,36,0.25);}
.badge-ok{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
.badge-info{background:rgba(79,195,247,0.1);color:var(--electric);border:1px solid rgba(79,195,247,0.2);}
.badge-dim{background:rgba(74,82,104,0.3);color:var(--dim);border:1px solid var(--border);}

/* Nav bars */
.nav-row{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);}
.mkt-bar{padding:0 32px;display:flex;align-items:stretch;gap:0;flex:1;overflow-x:auto;}
.mkt-tab{padding:10px 18px;font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;user-select:none;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.mkt-tab:hover{color:var(--muted);border-bottom-color:var(--border2);}
.mkt-tab.active{color:var(--electric);border-bottom-color:var(--electric);}
.mkt-tab .cur{font-size:8px;color:var(--dim);font-weight:400;}
.mkt-tab.active .cur{color:var(--electric);opacity:0.6;}

/* Week selector */
.week-ctrl{display:flex;align-items:center;gap:0;background:var(--bg3);border-bottom:1px solid var(--border);padding:6px 32px;}
.week-nav{padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);cursor:pointer;border:none;background:none;transition:color 0.15s;}
.week-nav:hover{color:var(--white);}
.week-nav:disabled{opacity:0.3;cursor:default;}
.week-select{background:var(--bg2);color:var(--white);border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;min-width:140px;}
.week-select:focus{outline:none;border-color:var(--electric);}
.week-range{display:flex;align-items:center;gap:8px;margin-left:20px;padding-left:20px;border-left:1px solid var(--border);}
.week-range-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;font-family:'DM Mono',monospace;}
.week-range-sel{background:var(--bg2);color:var(--white);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;}
.week-range-sel:focus{outline:none;border-color:var(--electric);}
.compare-badge{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;font-family:'DM Mono',monospace;background:rgba(79,195,247,0.1);color:var(--electric);border:1px solid rgba(79,195,247,0.2);margin-left:8px;}

/* Trend bar */
.trend-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:9px 32px;display:flex;align-items:center;gap:24px;overflow-x:auto;}
.trend-item{display:flex;align-items:center;gap:7px;white-space:nowrap;}
.trend-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;font-family:'DM Mono',monospace;}
.trend-v{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;}
.trend-delta{font-size:9px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:2px;}
.up-bad{color:var(--red);background:rgba(248,113,113,0.12);}
.up-good{color:var(--green);background:rgba(74,222,128,0.1);}
.down-bad{color:var(--red);background:rgba(248,113,113,0.12);}
.down-good{color:var(--green);background:rgba(74,222,128,0.1);}
.neutral{color:var(--dim);background:rgba(74,82,104,0.2);}
.trend-div{width:1px;height:18px;background:var(--border);}

/* Layout */
.page{padding:22px 32px;max-width:1600px;margin:0 auto;}
.sec{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:9px;font-family:'DM Mono',monospace;}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-bottom:22px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.kpi{background:var(--bg2);padding:13px 15px;position:relative;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.ok::before{background:var(--green);}.kpi.warn::before{background:var(--amber);}.kpi.crit::before{background:var(--red);}.kpi.neutral::before{background:var(--electric);}
.kpi-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;font-family:'DM Mono',monospace;}
.kpi-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--white);line-height:1;margin-bottom:3px;}
.kpi-val.crit{color:var(--red);}.kpi-val.warn{color:var(--amber);}.kpi-val.ok{color:var(--green);}
.kpi-sub{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;}
.kpi-sub.flag{color:var(--amber);}.kpi-sub.crit{color:var(--red);}.kpi-sub.ok{color:var(--green);}

/* Panels & Charts */
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:22px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
.four-col{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:22px;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.panel-header{padding:9px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-family:'DM Mono',monospace;font-weight:500;}
.panel-body{padding:14px;}
.chart-wrap canvas{max-height:200px;}
.chart-wrap.tall canvas{max-height:230px;}

/* Marketplace cards */
.mkt-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:2px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:22px;}
.mc{background:var(--bg2);padding:14px 16px;cursor:pointer;transition:background 0.15s;position:relative;}
.mc:hover{background:var(--bg3);}
.mc-name{font-weight:600;font-size:13px;color:var(--white);margin-bottom:3px;display:flex;align-items:center;gap:8px;}
.mc-name .mc-cur{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;font-weight:400;}
.mc-rev{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--white);margin-bottom:8px;}
.mc-row{display:flex;justify-content:space-between;margin-bottom:2px;}
.mc-l{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;}
.mc-v{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.mc-v.crit{color:var(--red);}.mc-v.warn{color:var(--amber);}.mc-v.ok{color:var(--green);}
.mc-pct{position:absolute;top:14px;right:16px;font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);}

/* Product grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:22px;}
.pc{background:var(--bg2);padding:11px 13px;position:relative;transition:background 0.15s;}
.pc:hover{background:var(--bg3);}
.pc.flagged{background:rgba(248,113,113,0.03);}.pc.warned{background:rgba(251,191,36,0.03);}
.pc-bar{position:absolute;top:0;left:0;right:0;height:2px;}
.pc-bar.crit{background:var(--red);}.pc-bar.warn{background:var(--amber);}.pc-bar.ok{background:var(--green);}
.pc-name{font-weight:600;font-size:11px;color:var(--white);margin-bottom:7px;margin-top:4px;}
.pc-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.pcl{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;}
.pcv{font-family:'DM Mono',monospace;font-size:11px;color:var(--white);font-weight:500;}
.pcv.hi{color:var(--white);}.pcv.crit{color:var(--red);}.pcv.warn{color:var(--amber);}.pcv.ok{color:var(--green);}
.eff-wrap{margin-top:7px;}
.eff-lbl{display:flex;justify-content:space-between;margin-bottom:3px;}
.eff-track{height:3px;background:var(--bg4);border-radius:2px;position:relative;overflow:hidden;}
.eff-fill{height:100%;border-radius:2px;width:0%;transition:width 0.7s ease;}
.eff-thresh{position:absolute;top:-3px;width:1px;height:9px;background:rgba(255,255,255,0.2);}

/* Flags */
.flag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.fc{border-radius:6px;padding:11px 13px;border:1px solid;}
.fc.crit{background:rgba(248,113,113,0.06);border-color:rgba(248,113,113,0.25);}
.fc.warn{background:rgba(251,191,36,0.06);border-color:rgba(251,191,36,0.2);}
.fc.info{background:rgba(79,195,247,0.05);border-color:rgba(79,195,247,0.2);}
.fc.ok{background:rgba(74,222,128,0.05);border-color:rgba(74,222,128,0.2);}
.ft{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:'DM Mono',monospace;margin-bottom:4px;}
.fc.crit .ft{color:var(--red);}.fc.warn .ft{color:var(--amber);}.fc.info .ft{color:var(--electric);}.fc.ok .ft{color:var(--green);}
.fp{font-size:11px;font-weight:600;color:var(--white);margin-bottom:3px;}
.fd{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.fa{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;border-top:1px solid rgba(255,255,255,0.06);padding-top:5px;}
.fc.crit .fa{color:rgba(248,113,113,0.7);}.fc.warn .fa{color:rgba(251,191,36,0.6);}.fc.info .fa{color:rgba(79,195,247,0.6);}

/* Tables */
.dt{width:100%;border-collapse:collapse;}
.dt th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-family:'DM Mono',monospace;font-weight:500;padding:5px 10px;text-align:right;border-bottom:1px solid var(--border);}
.dt th:first-child{text-align:left;}
.dt td{padding:7px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:right;border-bottom:1px solid var(--border);}
.dt td:first-child{text-align:left;color:var(--white);font-size:10px;font-weight:500;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:rgba(255,255,255,0.02);}
.td-hi{color:var(--white)!important;}.td-z{color:var(--dim)!important;}.td-w{color:var(--amber)!important;}.td-c{color:var(--red)!important;}.td-ok{color:var(--green)!important;}

/* Trend sparkline row */
.trend-charts{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:22px;}
.tcc{background:var(--bg2);padding:12px 14px;}
.tcc .tc-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;font-family:'DM Mono',monospace;margin-bottom:8px;}

footer{border-top:1px solid var(--border);padding:12px 32px;display:flex;justify-content:space-between;align-items:center;color:var(--dim);font-size:9px;font-family:'DM Mono',monospace;}
/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:20px;background:var(--bg3);border-bottom:1px solid var(--border);padding:7px 32px;}
.filter-group{display:flex;align-items:center;gap:4px;}
.filter-label{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-family:'DM Mono',monospace;margin-right:6px;}
.filter-btn{padding:4px 12px;border-radius:3px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:0.5px;color:var(--dim);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{color:var(--muted);border-color:var(--border2);}
.filter-btn.active{color:var(--electric);background:rgba(79,195,247,0.08);border-color:rgba(79,195,247,0.3);}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.ani{animation:fadeIn 0.3s ease both;}

@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(4,1fr);}.flag-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr);}.flag-grid{grid-template-columns:1fr;}.three-col{grid-template-columns:1fr;}}
</style>
</head>

function getGlobalAcct(w){
  const ms=w.markets, ks=filterMkts(Object.keys(ms));
  const t={revenue:0,units:0,sessions:0,pageviews:0,adSpend:0,adSales:0,organicSales:0,ntbOrders:0,ntbSales:0};
  ks.forEach(k=>{const a=ms[k].acct;for(let p in t)t[p]+=(a[p]||0);});
  t.cvr=t.sessions?((t.units/t.sessions)*100):0;
  t.acos=t.adSales?(t.adSpend/t.adSales*100):0;
  t.tacos=t.revenue?(t.adSpend/t.revenue*100):0;
  t.roas=t.adSpend?(t.adSales/t.adSpend):0;
  t.ntbPct=t.units>0?((t.ntbOrders/t.units)*100):0;
  return t;
}

// MTD: aggregate multiple weeks into one virtual week
function getMTDWeek(){
  if(WEEKS.length===0) return WEEKS[0];
  // Determine current month from the selected week
  const selWeek=WEEKS[wIdx];
  const selLabel=selWeek.label; // "WE 3/22"
  const monthMatch=selLabel.match(/WE (\d+)\//);
  const targetMonth=monthMatch?parseInt(monthMatch[1]):null;
  if(!targetMonth) return selWeek;

  // Find all weeks in the same month
  const monthWeeks=WEEKS.filter(w=>{
    const m=w.label.match(/WE (\d+)\//);
    return m && parseInt(m[1])===targetMonth;
  });

  if(monthWeeks.length<=1) return monthWeeks[0]||selWeek;

  // Aggregate markets across all weeks in the month
  const allMktKeys=new Set();
  monthWeeks.forEach(w=>Object.keys(w.markets).forEach(k=>allMktKeys.add(k)));

  const mtdMarkets={};
  allMktKeys.forEach(k=>{
    const sumAcct={revenue:0,units:0,sessions:0,pageviews:0,adSpend:0,adSales:0,organicSales:0,ntbOrders:0,ntbSales:0,clicks:0,impressions:0};
    monthWeeks.forEach(w=>{
      const a=w.markets[k]?.acct;
      if(a) for(let p in sumAcct) sumAcct[p]+=(a[p]||0);
    });
    // Recalculate ratio metrics from summed components
    sumAcct.cvr=sumAcct.sessions?((sumAcct.units/sumAcct.sessions)*100):0;
    sumAcct.acos=sumAcct.adSales?(sumAcct.adSpend/sumAcct.adSales*100):0;
    sumAcct.tacos=sumAcct.revenue?(sumAcct.adSpend/sumAcct.revenue*100):0;
    sumAcct.roas=sumAcct.adSpend?(sumAcct.adSales/sumAcct.adSpend):0;
    sumAcct.ntbPct=sumAcct.units>0?((sumAcct.ntbOrders/sumAcct.units)*100):0;

    // Aggregate products: sum by product name
    const prodMap={};
    monthWeeks.forEach(w=>{
      (w.markets[k]?.products||[]).forEach(p=>{
        if(!prodMap[p.name]) prodMap[p.name]={name:p.name,revenue:0,units:0,sessions:0,adSpend:0,adSales:0,organicSales:0,ntbOrders:0,clicks:0,impressions:0,bsr:p.bsr};
        const t=prodMap[p.name];
        t.revenue+=(p.revenue||0);t.units+=(p.units||0);t.sessions+=(p.sessions||0);
        t.adSpend+=(p.adSpend||0);t.adSales+=(p.adSales||0);t.organicSales+=(p.organicSales||0);
        t.ntbOrders+=(p.ntbOrders||0);
      });
    });
    const prods=Object.values(prodMap).map(p=>{
      p.cvr=p.sessions?((p.units/p.sessions)*100):0;
      p.acos=p.adSales?(p.adSpend/p.adSales*100):0;
      p.tacos=p.revenue?(p.adSpend/p.revenue*100):0;
      p.roas=p.adSpend?(p.adSales/p.adSpend):0;
      p.organic=p.revenue-p.adSales;
      p.status=p.acos>35?'crit':p.acos>28?'warn':'ok';
      return p;
    });
    prods.sort((a,b)=>b.revenue-a.revenue);

    // Collect flags from latest week only (avoid duplicates)
    const latestFlags=monthWeeks[0]?.markets[k]?.flags||[];

    mtdMarkets[k]={acct:sumAcct,products:prods,flags:latestFlags};
  });

  const monthNames=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {
    label:'MTD '+monthNames[targetMonth],
    fullLabel:'Month-to-Date: '+monthNames[targetMonth]+' 2026 ('+monthWeeks.length+' weeks)',
    range:monthWeeks[monthWeeks.length-1].label+' → '+monthWeeks[0].label,
    markets:mtdMarkets
  };
}

// Get the active week data (respects MTD mode)
function getActiveWeek(){
  if(viewMode==='MTD') return getMTDWeek();
  return WEEKS[wIdx];
}

function getMktData(w,mk){
  if(mk==='GLOBAL') return {acct:getGlobalAcct(w),products:[],flags:getAllFlags(w)};
  return w.markets[mk]||{acct:{revenue:0,units:0,sessions:0,pageviews:0,adSpend:0,adSales:0,organicSales:0,acos:0,tacos:0,roas:0,ntbOrders:0,ntbSales:0,ntbPct:0,cvr:0},products:[],flags:[]};
}

function getAllFlags(w){
  const all=[];
  const ks=filterMkts(Object.keys(w.markets));
  ks.forEach(k=>{
    (w.markets[k]?.flags||[]).forEach(f=>all.push({...f,mkt:k}));
  });
  const order={crit:0,warn:1,info:2,ok:3};
  all.sort((a,b)=>(order[a.type]||9)-(order[b.type]||9));
  return all;
}

function delta(val,prev,higherIsBad){
  if(prev===undefined||prev===null||prev===0)return '<span class="trend-delta neutral">—</span>';
  const d=val-prev,p=prev?((d/prev)*100).toFixed(1):'0',a=Math.abs(p);
  if(Math.abs(d)<0.01)return '<span class="trend-delta neutral">0%</span>';
  const cls=higherIsBad?(d>0?'up-bad':'down-good'):(d>0?'up-good':'down-bad');
  return `<span class="trend-delta ${cls}">${d>0?'&#9650;':'&#9660;'} ${a}%</span>`;
}

  const w=getActiveWeek(),a=getMktData(w,mktKey).acct;

    });
    html+='</div>';
  }

  document.getElementById('mainContent').innerHTML=html;
}

    const trendRevs=WEEKS.map(w=>{const d=getMktData(w,'GLOBAL');return d.acct.revenue;}).reverse();
    const trendTacos=WEEKS.map(w=>{const d=getMktData(w,'GLOBAL');return d.acct.tacos;}).reverse();

    mkChart('gRevTrend',{type:'line',data:{labels:wLabels,datasets:[{data:trendRevs,borderColor:'#4fc3f7',backgroundColor:'rgba(79,195,247,0.08)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#4fc3f7',borderWidth:2}]},options:{...def,scales:{x:{grid:{color:'#1a1e28'},ticks:{font:{size:9},maxRotation:45}},y:{...def.scales.y,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',font:{size:9}}}}}});

    mkChart('gTacosTrend',{type:'line',data:{labels:wLabels,datasets:[{data:trendTacos,borderColor:trendTacos.map(v=>v>15?'#f87171':v>10?'#fbbf24':'#4ade80'),segment:{borderColor:ctx=>{const v=ctx.p1.parsed.y;return v>15?'#f87171':v>10?'#fbbf24':'#4ade80';}},backgroundColor:'rgba(79,195,247,0.05)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:trendTacos.map(v=>v>15?'#f87171':v>10?'#fbbf24':'#4ade80'),borderWidth:2},{label:'10% Target',data:new Array(wLabels.length).fill(10),borderColor:'rgba(255,255,255,0.12)',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false}]},options:{...def,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1a1e28'},ticks:{font:{size:9},maxRotation:45}},y:{...def.scales.y,ticks:{callback:v=>v+'%',font:{size:9}}}}}});
  }
}

function buildMktCharts(){
  const d=getMktData(getActiveWeek(),mktKey);
  const prods=d.products||[];
  if(!prods.length)return;
  const pn=prods.map(p=>p.name.length>14?p.name.substring(0,12)+'..':p.name);
  const cur=getCur(mktKey);
  const revs=prods.map(p=>p.revenue);
  const ads=prods.map(p=>p.adSales);
  const org=prods.map(p=>Math.max(0,(p.organic||0)));
  const tacs=prods.map(p=>p.tacos);
  const cols=prods.map((_,i)=>PC_COLORS[i%PC_COLORS.length]);
  const def={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1a1e28'},ticks:{font:{size:9}}},y:{grid:{color:'#1a1e28'}}}};

  mkChart('cRevenue',{type:'bar',data:{labels:pn,datasets:[{data:revs,backgroundColor:cols.map(c=>c+'30'),borderColor:cols,borderWidth:1.5,borderRadius:2}]},options:{...def,scales:{x:def.scales.x,y:{...def.scales.y,ticks:{callback:v=>cur+(v/1000).toFixed(0)+'k',font:{size:9}}}}}});

  mkChart('cOrganic',{type:'bar',data:{labels:pn,datasets:[{label:'Organic',data:org,backgroundColor:'rgba(74,222,128,0.2)',borderColor:'#4ade80',borderWidth:1},{label:'Ad Sales',data:ads,backgroundColor:'rgba(79,195,247,0.17)',borderColor:'#4fc3f7',borderWidth:1}]},options:{...def,plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:10,font:{size:9}}}},scales:{x:{stacked:true,grid:{color:'#1a1e28'},ticks:{font:{size:9}}},y:{stacked:true,grid:{color:'#1a1e28'},ticks:{callback:v=>cur+(v/1000).toFixed(0)+'k',font:{size:9}}}}}});

  mkChart('cTacos',{type:'bar',data:{labels:pn,datasets:[{label:'TACoS',data:tacs,backgroundColor:tacs.map(v=>v>15?'rgba(248,113,113,0.3)':v>10?'rgba(251,191,36,0.3)':'rgba(74,222,128,0.25)'),borderColor:tacs.map(v=>v>15?'#f87171':v>10?'#fbbf24':'#4ade80'),borderWidth:1.5,borderRadius:2},{label:'10% Target',data:new Array(prods.length).fill(10),type:'line',borderColor:'rgba(255,255,255,0.12)',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false}]},options:{...def,plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:10,font:{size:9}}}},scales:{x:def.scales.x,y:{...def.scales.y,ticks:{callback:v=>v+'%',font:{size:9}}}}}});
}

// ═══════════════════════════════════════════════════════════════
// RENDER ORCHESTRATOR
// ═══════════════════════════════════════════════════════════════
function render(){
  renderHeader();
  renderMktTabs();
  renderWeekSelector();
  renderTrendBar();
  renderFilterBar();
  renderKPIs();
  destroyAll();

  if(mktKey==='GLOBAL'){
    renderGlobalView();
    requestAnimationFrame(()=>buildGlobalCharts());
  } else {
    renderMktView();
    requestAnimationFrame(()=>{
      buildMktCharts();
      setTimeout(()=>{
        document.querySelectorAll('.eff-fill').forEach((b,i)=>{
          setTimeout(()=>{b.style.width=b.getAttribute('data-w')+'%';},i*35);
        });
      },60);
    });
  }

  const aw=getActiveWeek();
  document.getElementById('footWeek').textContent=aw.fullLabel;
  document.getElementById('footMkt').textContent=MKT_META[mktKey]?.name||mktKey;
}

function switchMkt(mk){mktKey=mk;render();}
function switchWeek(i){wIdx=parseInt(i);render();}
function weekPrev(){if(wIdx<WEEKS.length-1){wIdx++;render();}}
function weekNext(){if(wIdx>0){wIdx--;render();}}
function toggleBrand(){brandFilter=brandFilter==='ALL'?'CC':'ALL';render();}
function toggleView(){viewMode=viewMode==='WEEKLY'?'MTD':'WEEKLY';render();}

function renderFilterBar(){
  const fb=document.getElementById('filterBar');
  if(!fb) return;
  fb.innerHTML=`
    <div class="filter-group">
      <span class="filter-label">VIEW</span>
      <button class="filter-btn ${viewMode==='WEEKLY'?'active':''}" onclick="toggleView()">WEEKLY</button>
      <button class="filter-btn ${viewMode==='MTD'?'active':''}" onclick="toggleView()">MTD</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">BRANDS</span>
      <button class="filter-btn ${brandFilter==='ALL'?'active':''}" onclick="toggleBrand()">ALL BRANDS</button>
      <button class="filter-btn ${brandFilter==='CC'?'active':''}" onclick="toggleBrand()">CERAMICS ONLY</button>
    </div>
  `;
}

window.addEventListener('load',()=>render());
</script>

    <div class="divider-v"></div>
    <div class="header-meta"><span class="lbl">Week Ending</span><span class="val" id="hWeek">—</span></div>
  </div>
  <div class="header-right">
    <span class="badge badge-crit" id="bCrit">—</span>
    <span class="badge badge-warn" id="bWarn">—</span>

</header>

</nav>

  <select class="week-select" id="weekSelect" onchange="switchWeek(this.value)"></select>

</div>
